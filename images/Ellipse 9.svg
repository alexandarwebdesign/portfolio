<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <g>
    <animateTransform 
        attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="4.64s" 
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1" repeatCount="indefinite" />

    <circle id="hoverArea" cx="400" cy="400" r="380" stroke="transparent" stroke-width="80" fill="transparent" cursor="pointer" />

    <circle cx="400" cy="400" r="380"
          stroke="#464646" stroke-width="12" stroke-linecap="round" fill="none"
          pathLength="100" stroke-dasharray="1 8" pointer-events="none">

      <animate attributeName="stroke-dashoffset" values="100; 0" dur="7s" repeatCount="indefinite" />

      <animate attributeName="stroke-dasharray" values="1 8; 100 0" dur="0.4s" begin="hoverArea.mouseover" fill="freeze" />
      <animate attributeName="stroke-dasharray" values="100 0; 1 8" dur="0.4s" begin="hoverArea.mouseout" fill="freeze" />

      <animate attributeName="stroke" values="#464646; #3b82f6" dur="0.4s" begin="hoverArea.mouseover" fill="freeze" />
      <animate attributeName="stroke" values="#3b82f6; #464646" dur="0.4s" begin="hoverArea.mouseout" fill="freeze" />

      <animate attributeName="stroke-width" values="12; 18" dur="0.4s" begin="hoverArea.mouseover" fill="freeze" />
      <animate attributeName="stroke-width" values="18; 12" dur="0.4s" begin="hoverArea.mouseout" fill="freeze" />
    </circle>
  </g>
</svg>
