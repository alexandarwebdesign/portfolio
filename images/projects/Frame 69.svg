<svg width="19" height="19" viewBox="0 0 19 19" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Core dot -->
<circle cx="9.5" cy="9.5" r="1.5" fill="#34C759">
  <animate attributeName="r" values="1.5;1.8;1.5" dur="2s" repeatCount="indefinite"/>
</circle>
<!-- Ring 1 -->
<circle cx="9.5" cy="9.5" r="2.25" stroke="#34C759" stroke-width="0.5" fill="none">
  <animate attributeName="r" values="2.25;3;2.25" dur="2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
</circle>
<!-- Ring 2 -->
<circle cx="9.5" cy="9.5" r="4.25" stroke="#34C759" stroke-width="0.5" fill="none">
  <animate attributeName="r" values="4.25;5.2;4.25" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2s" begin="0.3s" repeatCount="indefinite"/>
</circle>
<!-- Ring 3 -->
<circle cx="9.5" cy="9.5" r="5.4" stroke="#34C759" stroke-width="0.2" fill="none">
  <animate attributeName="r" values="5.4;7;5.4" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" begin="0.6s" repeatCount="indefinite"/>
</circle>
</svg>
