<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signature Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"></noscript>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        min-height: 100vh;
      }

      .signature-lab {
        padding: clamp(2rem, 5vw, 4rem) 0;
      }

      .signature-lab__header {
        display: grid;
        gap: var(--space-4);
        margin-bottom: var(--space-8);
      }

      .signature-lab__eyebrow {
        margin: 0;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--color-accent);
      }

      .signature-lab__title,
      .signature-lab__intro {
        margin: 0;
      }

      .signature-lab__title {
        font-family: var(--font-display);
        font-size: clamp(2.2rem, 6vw, 4.5rem);
        font-weight: 500;
        line-height: 0.94;
        letter-spacing: -0.05em;
      }

      .signature-lab__intro {
        max-width: 48rem;
        font-size: clamp(1rem, 1.4vw, 1.18rem);
        line-height: 1.6;
        color: var(--color-text-muted);
      }

      .signature-lab__grid {
        display: grid;
        gap: var(--space-6);
      }

      .signature-lab__cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: var(--space-4);
      }

      .signature-lab__card {
        display: grid;
        gap: var(--space-3);
        padding: var(--space-5);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 24px;
        background: linear-gradient(140deg, rgba(255, 255, 255, 0.78) 0%, rgba(255, 255, 255, 0.4) 100%);
        text-align: left;
        cursor: pointer;
        transition:
          transform var(--motion-tempo-primary) var(--motion-ease-primary),
          border-color var(--motion-tempo-primary) var(--motion-ease-primary),
          box-shadow var(--motion-tempo-primary) var(--motion-ease-primary);
      }

      .signature-lab__card.is-active,
      .signature-lab__card:hover,
      .signature-lab__card:focus-visible {
        transform: translateY(-4px);
        border-color: rgba(0, 102, 255, 0.24);
        box-shadow:
          0 18px 40px rgba(10, 26, 52, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
      }

      .signature-lab__card-eyebrow,
      .signature-lab__card-title,
      .signature-lab__card-persona {
        margin: 0;
      }

      .signature-lab__card-eyebrow {
        font-size: 0.8rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--color-text-light);
      }

      .signature-lab__card-title {
        font-family: var(--font-display);
        font-size: clamp(1.5rem, 2.6vw, 2rem);
        line-height: 0.96;
        letter-spacing: -0.04em;
      }

      .signature-lab__card-persona {
        color: var(--color-text-muted);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="signature-lab">
      <div class="container">
        <header class="signature-lab__header">
          <p class="signature-lab__eyebrow">Signature Playground</p>
          <h1 class="signature-lab__title">The portfolio answers in the client's voice.</h1>
          <p class="signature-lab__intro">
            This prototype tests the Stage 4 signature: the project grid does not just show work, it reveals the pressure each project had to answer.
          </p>
        </header>

        <div class="signature-lab__grid">
          <section class="work-signature glass-panel" id="lab-signature" aria-label="Live project brief preview">
            <div class="work-signature__top">
              <p class="work-signature__eyebrow">Live Brief Pressure</p>
              <p class="work-signature__meta" id="lab-signature-meta">Portfolio · 2025</p>
            </div>
            <div class="work-signature__swap">
              <p class="work-signature__persona" id="lab-signature-persona">Loading...</p>
              <p class="work-signature__quote" id="lab-signature-quote">Loading project brief...</p>
            </div>
          </section>

          <section class="signature-lab__cards" id="lab-cards" aria-label="Signature prototype cards"></section>
        </div>
      </div>
    </main>

    <script>
      (function () {
        function decodeHtmlEntities(value) {
          const textarea = document.createElement("textarea");
          textarea.innerHTML = value;
          return textarea.value;
        }

        function stripHtml(value) {
          return decodeHtmlEntities(
            String(value || "")
              .replace(/<br\s*\/?>/gi, "\n")
              .replace(/<\/(p|li|h3)>/gi, "\n")
              .replace(/<[^>]+>/g, " ")
          )
            .replace(/\u2022/g, "\n")
            .replace(/[ \t]+\n/g, "\n")
            .replace(/\n[ \t]+/g, "\n")
            .replace(/\n{2,}/g, "\n")
            .replace(/[ \t]{2,}/g, " ")
            .trim();
        }

        function escapeAttribute(value) {
          return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }

        function extractBriefPressure(project) {
          const text = stripHtml(project.the_brief || project.description || "")
            .replace(/[“”]/g, '"')
            .replace(/[‘’]/g, "'");

          const quoted = [...text.matchAll(/["']([^"']{18,140})["']/g)]
            .map((match) => match[1].trim())
            .filter((value) => value.split(/\s+/).length >= 4)
            .sort((a, b) => b.length - a.length);

          if (quoted.length > 0) {
            return quoted[0];
          }

          const description = stripHtml(project.description || "");
          return description.length <= 140
            ? description
            : `${description.slice(0, 137).trim()}...`;
        }

        function setPanel(card) {
          const panel = document.getElementById("lab-signature");
          const persona = document.getElementById("lab-signature-persona");
          const quote = document.getElementById("lab-signature-quote");
          const meta = document.getElementById("lab-signature-meta");
          const cards = document.querySelectorAll(".signature-lab__card");

          cards.forEach((item) => {
            item.classList.toggle("is-active", item === card);
          });

          panel.classList.add("is-refreshing");

          window.setTimeout(() => {
            persona.textContent = card.dataset.persona || "";
            quote.textContent = card.dataset.quote || "";
            meta.textContent = card.dataset.meta || "";
            panel.classList.remove("is-refreshing");
          }, 110);
        }

        fetch("/data/projects.json")
          .then((response) => response.json())
          .then((data) => {
            const projects = (data.projects || []).filter((project) => project.featured).slice(0, 4);
            const cards = document.getElementById("lab-cards");

            cards.innerHTML = projects.map((project) => `
              <button
                type="button"
                class="signature-lab__card"
                data-persona="${escapeAttribute(project.client_persona)}"
                data-quote="${escapeAttribute(extractBriefPressure(project))}"
                data-meta="${escapeAttribute(`${project.category} · ${project.year}`)}"
              >
                <p class="signature-lab__card-eyebrow">${project.category}</p>
                <p class="signature-lab__card-title">${project.title}</p>
                <p class="signature-lab__card-persona">${project.client_persona}</p>
              </button>
            `).join("");

            const renderedCards = Array.from(document.querySelectorAll(".signature-lab__card"));
            renderedCards.forEach((card) => {
              card.addEventListener("mouseenter", () => setPanel(card));
              card.addEventListener("focus", () => setPanel(card));
            });

            if (renderedCards[0]) {
              setPanel(renderedCards[0]);
            }
          });
      })();
    </script>
  </body>
</html>
