<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Aleksandar Pavlov</title>
  <meta name="description" content="Page not found. Return to Aleksandar Pavlov's portfolio — UX/UI design and web development.">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" href="/favicon.png">
  

  <style>
    @font-face {
      font-family: 'Manrope';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url('/fonts/manrope-latin-ext.woff2') format('woff2');
      unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
    }
    @font-face {
      font-family: 'Manrope';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url('/fonts/manrope-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    /* MASTER RULES - DESIGN TAGS */
    :root {
      /* Colors */
      --color-background: #F4F9FA;
      --color-text: #29303D;
      --color-accent: #0066FF;
      --color-white: #FFFFFF;
      
      /* Typography */
      --font-display: 'Manrope', sans-serif;
      --font-body: 'Manrope', sans-serif;
      
      /* Spacing/Shape */
      --border-radius-button: 13.33px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: var(--font-body);
      background: var(--color-background);
      color: var(--color-text);
      overflow-x: hidden;
    }
    
    #tunnel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: 1;
    }
    
    .content {
      position: relative;
      z-index: 2;
      pointer-events: none;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    /* Semantic H1 for SEO/Accessibility, visually hidden */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .message {
        margin-top: 250px; /* Space for the 3D Text */
        font-family: var(--font-body);
        font-size: 1.5rem;
        margin-bottom: 2rem;
        opacity: 0.8;
        text-align: center;
    }
    
    .home-btn {
        pointer-events: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 16px 32px;
        background: var(--color-accent); /* Master Rule: #0066FF */
        color: var(--color-white);
        text-decoration: none;
        font-family: var(--font-body);
        font-weight: 600;
        font-size: 24px;
        letter-spacing: 0.24px;
        line-height: 1.5;
        border-radius: var(--border-radius-button);
        box-shadow: inset 0px 4px 8px rgba(255, 255, 255, 0.2);
        transition: transform 300ms cubic-bezier(0.0, 0, 0.2, 1), box-shadow 300ms cubic-bezier(0.0, 0, 0.2, 1);
    }

    .home-btn:hover {
        transform: translateY(-2px);
        box-shadow: inset 0px 4px 8px rgba(255, 255, 255, 0.2), 0 12px 24px rgba(0, 102, 255, 0.24);
    }
    
    .spacer {
      position: absolute;
      bottom: 2rem;
      width: 100%;
      text-align: center;
      font-size: 1.2rem;
      opacity: 0.5;
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
        .message {
            margin-top: 180px; /* Reduced space */
            font-size: 1.125rem;
            padding: 0 24px;
        }

        .home-btn {
            padding: 14px 24px;
            font-size: 18px;
            width: auto;
            min-width: 180px;
        }
    }
  </style>

  <!-- Import Map for Three.js Modules -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="tunnel"></div>
  
  <div class="content">
    <h1 class="sr-only">404 - Page Not Found</h1>
    
    <p class="message">This page has drifted into the void.</p>
    
    <a href="/" class="home-btn" aria-label="Return to Home">
      Return to Signal
    </a>


  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  
  <script type="module">
    import * as THREE from 'three';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';


    
    // Settings matching Design System + Tunnel Vibe
    const settings = {
      bgColor: 0xF4F9FA, // Master Rule Background
      gridColor: 0x111111, // Darker grid lines
      gridOpacity: 0.2,
      accentColor: 0x0066FF // Master Rule Accent
    };
    
    // Scene Setup
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(settings.bgColor, 0.025);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.z = 15; // Pulled back for text

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(settings.bgColor, 1);
    document.getElementById("tunnel").appendChild(renderer.domElement);

    // Lighting for 3D Text
    const ambientLight = new THREE.AmbientLight(0xffffff, 1);
    scene.add(ambientLight);
    
    const dirLight = new THREE.DirectionalLight(0xffffff, 2.0); // Stronger key light
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Add a point light for dynamic specular highlights
    const pointLight = new THREE.PointLight(0xffffff, 10, 100);
    pointLight.position.set(0, 5, 5);
    scene.add(pointLight);

    // 3D Text Loading
    let textMesh;
    const loader = new FontLoader();
    loader.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json', function (font) {
        const textGeo = new TextGeometry('404', {
            font: font,
            size: 6,
            height: 1, // Thickness
            curveSegments: 12,
            bevelEnabled: true,
            bevelThickness: 0.1,
            bevelSize: 0.1,
            bevelOffset: 0,
            bevelSegments: 15
        });

        textGeo.center(); // Center the geometry

        const textMat = new THREE.MeshPhysicalMaterial({ 
            color: settings.gridColor,
            roughness: 0, // Very smooth for sharp reflections
            metalness: 0, // High metalness for reflections
            clearcoat: 1.0, // distinct clearcoat layer
            clearcoatRoughness: 1
        });

        textMesh = new THREE.Mesh(textGeo, textMat);
        textMesh.position.y = 2; // Lift slightly
        
        // Responsive Scale
        const isMobile = window.innerWidth < 768;
        const targetScale = isMobile ? 0.5 : 1;
        textMesh.scale.set(targetScale, targetScale, targetScale);

        scene.add(textMesh);
        
        // Initial intro animation
        gsap.from(textMesh.scale, { x: 0, y: 0, z: 0, duration: 1.5, ease: "elastic.out(1, 0.3)" });
        gsap.from(textMesh.rotation, { y: Math.PI * 2, duration: 2, ease: "power3.out" });
    });

    // Tunnel Construction
    const tunnelGroup = new THREE.Group();
    scene.add(tunnelGroup);

    function createGridTunnel() {
        // Floor
        const gridHelperBot = new THREE.GridHelper(100, 40, settings.gridColor, settings.gridColor);
        gridHelperBot.position.y = -5;
        gridHelperBot.material.opacity = settings.gridOpacity;
        gridHelperBot.material.transparent = true;
        tunnelGroup.add(gridHelperBot);

        // Ceiling
        const gridHelperTop = new THREE.GridHelper(100, 40, settings.gridColor, settings.gridColor);
        gridHelperTop.position.y = 5;
        gridHelperTop.material.opacity = settings.gridOpacity;
        gridHelperTop.material.transparent = true;
        tunnelGroup.add(gridHelperTop);
        
        // Walls (using Grids rotated)
        const gridHelperLeft = new THREE.GridHelper(100, 40, settings.gridColor, settings.gridColor);
        gridHelperLeft.rotation.z = Math.PI / 2;
        gridHelperLeft.position.x = -15;
        gridHelperLeft.material.opacity = settings.gridOpacity;
        gridHelperLeft.material.transparent = true;
        tunnelGroup.add(gridHelperLeft);
        
        const gridHelperRight = new THREE.GridHelper(100, 40, settings.gridColor, settings.gridColor);
        gridHelperRight.rotation.z = Math.PI / 2;
        gridHelperRight.position.x = 15;
        gridHelperRight.material.opacity = settings.gridOpacity;
        gridHelperRight.material.transparent = true;
        tunnelGroup.add(gridHelperRight);
    }
    createGridTunnel();

    // Animation Loop
    function animate() {
        requestAnimationFrame(animate);

        // Rotating Tunnel
        tunnelGroup.rotation.z += 0.0035; // Much slower rotation

        // Infinite Tunnel Effect
        tunnelGroup.children.forEach(grid => {
            grid.position.z += 0.08;
            if (grid.position.z > 2.5) grid.position.z = 0; // Seamless loop based on grid spacing
        });

        // Float 3D Text
        if (textMesh) {
            textMesh.rotation.x = Math.sin(Date.now() * 0.001) * 0.1;
            textMesh.rotation.y = Math.cos(Date.now() * 0.0015) * 0.15;
            // Counter-rotate text slightly for floaty feel vs tunnel
            textMesh.rotation.z = Math.sin(Date.now() * 0.0005) * 0.05;
        }

        renderer.render(scene, camera);
    }
    animate();



    // Resize Handler
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Adjust text scale on resize
        if (textMesh) {
            const isMobile = window.innerWidth < 768;
            const targetScale = isMobile ? 0.5 : 1;
            // Smoothly animate to new scale
            gsap.to(textMesh.scale, {
                x: targetScale,
                y: targetScale,
                z: targetScale,
                duration: 0.5
            });
        }
    });
  </script>
</body>
</html>
